name: Detect Migrations

on:
  workflow_call:
    inputs:
      turbo_base:
        description: Base SHA for diff.
        required: true
        type: string
      turbo_head:
        description: Head SHA for diff.
        required: true
        type: string
    outputs:
      has_migrations:
        description: Whether migration files changed.
        value: ${{ jobs.detect.outputs.has_migrations }}

jobs:
  detect:
    name: Detect DB Migrations
    runs-on: ubuntu-latest
    outputs:
      has_migrations: ${{ steps.detect.outputs.has_migrations }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed migration files
        id: detect
        shell: bash
        run: |
          if git diff --quiet "${{ inputs.turbo_base }}" "${{ inputs.turbo_head }}" -- packages/database/drizzle/migrations; then
            echo "has_migrations=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_migrations=true" >> "$GITHUB_OUTPUT"
          fi
