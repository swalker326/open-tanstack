name: Turbo Affected Task

on:
  workflow_call:
    inputs:
      job_name:
        description: Display name for the job.
        required: true
        type: string
      task:
        description: Turbo task name to run.
        required: true
        type: string
      filter:
        description: Turbo package filter.
        required: true
        type: string
      turbo_base:
        description: Base SHA for affected comparison.
        required: true
        type: string
      turbo_head:
        description: Head SHA for affected comparison.
        required: true
        type: string
      api_url:
        description: API URL for web build.
        required: false
        default: ''
        type: string
      issuer_url:
        description: Issuer URL for web build.
        required: false
        default: ''
        type: string

jobs:
  run:
    name: ${{ inputs.job_name }}
    runs-on: ubuntu-latest

    env:
      TURBO_SCM_BASE: ${{ inputs.turbo_base }}
      TURBO_SCM_HEAD: ${{ inputs.turbo_head }}
      API_URL: ${{ inputs.api_url }}
      ISSUER_URL: ${{ inputs.issuer_url }}
      ZE_SECRET_TOKEN: ${{ secrets.ZE_SECRET_KEY || secrets.ZEPHYR_AUTH_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Plan affected turbo task
        id: plan
        shell: bash
        run: |
          pnpm turbo run "${{ inputs.task }}" --affected --dry=json > turbo-plan.json

          echo "Planned affected tasks:"
          node -e 'const fs=require("node:fs");const p=JSON.parse(fs.readFileSync("turbo-plan.json","utf8"));const ids=(p.tasks||[]).map((t)=>t.taskId);console.log(ids.length?ids.join("\n"):"(none)");'

          SHOULD_RUN="$(node -e 'const fs=require("node:fs");const p=JSON.parse(fs.readFileSync("turbo-plan.json","utf8"));const pkg=process.argv[1];const task=process.argv[2];const shouldRun=(p.tasks||[]).some((t)=>t.package===pkg&&t.task===task);process.stdout.write(shouldRun?"true":"false");' "${{ inputs.filter }}" "${{ inputs.task }}")"
          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"

      - name: Run turbo task with summary
        if: steps.plan.outputs.should_run == 'true'
        run: pnpm turbo run "${{ inputs.task }}" --filter="${{ inputs.filter }}" --summarize

      - name: Skip unaffected task
        if: steps.plan.outputs.should_run != 'true'
        run: echo "Skipping '${{ inputs.task }}' for '${{ inputs.filter }}' because it is not affected."
